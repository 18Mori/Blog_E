{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Blogs</title>
    <link href="https://getbootstrap.com/docs/4.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
  </head>
<body>
    <div class="container">
      <header class="blog-header py-3">
        <div class="row flex-nowrap justify-content-between align-items-center">
          <div class="col-4 pt-1" style='display: flex; text-transform: uppercase; font-weight: bold; letter-spacing: 2px;'>
            <a class="blog-header-logo text-dark" href="{% url 'Home' %}">blogMe</a>
          </div>

          <div class="col-4">
            <form action="{% url 'search' %}" method="GET">
              <div class="input-group">
                <input class="form-control" type="text" name="keyword" value="{{ keyword }}" placeholder="Enter search term..." aria-label="Enter search term..." aria-describedby="button-search" />
                <button type="submit" class="btn btn-warning ml-2" id="button-search" type="button">Go</button>
              </div>
            </form>
          </div>
    
          <div class="col-4 d-flex justify-content-end align-items-center">
            <button class="btn btn-sm btn-secondary mr-3" onclick='window.location.href="/"'>Home</button>
            {% if not user.is_authenticated %}
            <a class="btn btn-sm btn-warning" style='color: #000; text-decoration: none;'  href="{% url 'login' %}">Login</a> &nbsp;
            <a class="btn btn-sm btn-outline-secondary" style='color: #000; text-decoration: none;'  href="{% url 'register' %}">Register</a>
            {% else %}
            <span class='navbar-text mr-3 text-muted font-weight-bold'>{{ user }}</span>
            &emsp;
            
            <span><a class="btn btn-sm btn-danger" style='color: #ffffff; text-decoration: none;'  href="{% url 'logout' %}">Logout</a></span>
            {% endif %}
          
          </div>
        </div>
      </header>

      <div class="nav-scroller py-1 mb-2">
        <nav class="nav d-flex justify-content-between">
          {% for cate in categories %}
          <a class="p-2 text-muted" href="{% url 'posts_by_category' cate.id %}">{{ cate.category_names }}</a>
          {% endfor %}
        </nav>
      </div>

{% block content %}

{% endblock %}

<footer class="blog-footer text-center text-muted">
    <p>Django blog built by <a class="text-muted" style='color: #000; text-decoration: none;'  href="😶">Morii</a></p>
  </footer>
  </body>
  </html>
